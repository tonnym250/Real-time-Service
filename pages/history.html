<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Time Service Delivery System — History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #18201d;
      --text: #2b3430;
      --muted: #6f7a74;
      --quiet: #8a948f;
      --bg: #f5f7f4;
      --panel: #ffffff;
      --panel-soft: #fbfcfa;
      --nav: #17231f;
      --nav-2: #21322d;
      --line: #dfe5df;
      --line-strong: #ccd5ce;
      --amber: #d98a12;
      --amber-bg: #fff3d8;
      --green: #168a5b;
      --green-bg: #e5f6ee;
      --teal: #128678;
      --teal-bg: #e1f4f1;
      --red: #c2413b;
      --red-bg: #fde9e8;
      --idle: #69736e;
      --idle-bg: #eef1ee;
      --shadow: 0 18px 48px rgba(27, 41, 35, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      display: grid;
      min-height: 100vh;
      grid-template-columns: 264px minmax(0, 1fr);
      background:
        linear-gradient(90deg, var(--nav) 0 264px, transparent 264px),
        var(--bg);
    }

    .sidebar {
      position: sticky;
      top: 0;
      display: flex;
      height: 100vh;
      flex-direction: column;
      justify-content: space-between;
      gap: 28px;
      padding: 24px 20px;
      color: #f3f7f4;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .brand-icon {
      display: inline-grid;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: #f7b64b;
      color: #17231f;
      font-weight: 800;
    }

    .brand-title {
      min-width: 0;
    }

    .brand-title h1 {
      margin: 0;
      color: #ffffff;
      font-size: 1.15rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand-title p {
      margin: 4px 0 0;
      color: rgba(243, 247, 244, 0.66);
      font-size: 0.82rem;
    }

    .nav-list {
      display: grid;
      gap: 8px;
      margin-top: 32px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 8px;
      color: rgba(243, 247, 244, 0.72);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.09);
      color: #ffffff;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .nav-symbol {
      display: inline-grid;
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #f7b64b;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .connection-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background: var(--nav-2);
    }

    .connection-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .connection-label {
      color: rgba(243, 247, 244, 0.64);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .connection-state {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: #ffffff;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .dot {
      width: 9px;
      height: 9px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--quiet);
    }

    .dot.connected {
      background: #2ed39d;
      box-shadow: 0 0 0 6px rgba(46, 211, 157, 0.12);
    }

    .dot.error {
      background: #ff8279;
      box-shadow: 0 0 0 6px rgba(255, 130, 121, 0.12);
    }

    .dot.reconnecting {
      background: #f7b64b;
      box-shadow: 0 0 0 6px rgba(247, 182, 75, 0.12);
    }

    .last-sync {
      color: rgba(243, 247, 244, 0.62);
      font-size: 0.8rem;
    }

    .main {
      min-width: 0;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin: 0 auto 20px;
      max-width: 1280px;
    }

    .page-heading {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .page-heading h2 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.4rem, 2.4vw, 2rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .icon-button {
      display: inline-grid;
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(27, 41, 35, 0.04);
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .icon-button:hover {
      border-color: var(--line-strong);
      background: var(--panel-soft);
      transform: translateY(-1px);
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      max-width: 1280px;
      margin: 0 auto 18px;
      flex-wrap: wrap;
    }

    .filter-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }

    .filter-input {
      min-width: 140px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 0.9rem;
    }

    .history-table {
      max-width: 1280px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-header {
      display: grid;
      grid-template-columns: 140px 140px 200px 180px 120px;
      gap: 0;
      background: var(--panel-soft);
      border-bottom: 1px solid var(--line);
    }

    .table-header-cell {
      padding: 14px 16px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-right: 1px solid var(--line);
    }

    .table-header-cell:last-child {
      border-right: 0;
    }

    .table-body {
      display: grid;
      max-height: 600px;
      overflow-y: auto;
    }

    .table-row {
      display: grid;
      grid-template-columns: 140px 140px 200px 180px 120px;
      gap: 0;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .table-row:hover {
      background: var(--panel-soft);
    }

    .table-row:last-child {
      border-bottom: 0;
    }

    .table-cell {
      padding: 14px 16px;
      border-right: 1px solid var(--line);
      color: var(--text);
      font-size: 0.9rem;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .table-cell:last-child {
      border-right: 0;
    }

    .table-cell.status-requested {
      color: var(--amber);
      font-weight: 700;
    }

    .table-cell.status-served {
      color: var(--green);
      font-weight: 700;
    }

    .table-cell.table-id {
      font-weight: 700;
      color: var(--ink);
    }

    .empty-history {
      display: grid;
      min-height: 300px;
      place-items: center;
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 1120px) {
      .shell {
        grid-template-columns: 1fr;
        background: var(--bg);
      }

      .sidebar {
        position: relative;
        height: auto;
        padding: 18px 20px;
        background: var(--nav);
      }

      .nav-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }

      .table-header,
      .table-row {
        grid-template-columns: 100px 100px 1fr 100px;
      }

      .filter-bar {
        flex-direction: column;
      }

      .filter-control {
        width: 100%;
      }

      .filter-input {
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      .brand-title h1 {
        font-size: 1.05rem;
      }

      .table-header,
      .table-row {
        grid-template-columns: 80px 80px 1fr;
      }

      .table-header-cell:nth-child(4),
      .table-row:nth-child(4) .table-cell {
        display: none;
      }

      .table-cell {
        font-size: 0.85rem;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" aria-label="Real Time Service Delivery System navigation">
      <div class="sidebar-main">
        <div>
          <div class="brand-mark">
            <img src="../images/medwell.jpeg" alt="Real-Time Service logo" class="brand-logo" />
            <div class="brand-title">
              <h1>Real-Time Service</h1>
              <h1 class="brand-subtitle">Delivery System</h1>
              <p>Historical records</p>
            </div>
          </div>
          <nav class="nav-list" aria-label="Dashboard sections">
            <a href="dashboard.html" class="nav-item"><span class="nav-symbol">F</span><span>Dashboard</span></a>
            <a href="analytics.html" class="nav-item"><span class="nav-symbol">A</span><span>Analytics</span></a>
            <a href="history.html" class="nav-item active"><span class="nav-symbol">H</span><span>History</span></a>
            <a href="alerts.html" class="nav-item"><span class="nav-symbol">🔔</span><span>Alerts</span></a>
            <a href="recommendation.html" class="nav-item"><span class="nav-symbol">💡</span><span>Recommendations</span></a>
          </nav>
        </div>
      </div>

      <div class="connection-card" aria-live="polite">
        <div class="connection-top">
          <span class="connection-label">Connection</span>
          <span class="connection-state">
            <span id="connectionDot" class="dot reconnecting"></span>
            <span id="connectionText">Connecting</span>
          </span>
        </div>
        <div id="lastSync" class="last-sync">Last sync: waiting</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-heading">
          <p class="eyebrow">Complete event log</p>
          <h2>Service history & records</h2>
        </div>
        <div class="toolbar">
          <button id="refreshButton" class="icon-button" type="button" title="Refresh history" aria-label="Refresh history">↻</button>
          <button id="exportButton" class="icon-button" type="button" title="Export as CSV" aria-label="Export as CSV">⬇</button>
        </div>
      </header>

      <div class="filter-bar">
        <div class="filter-control">
          <label class="filter-label" for="filterDate">Date:</label>
          <input type="date" class="filter-input" id="filterDate" title="Filter by date" />
        </div>
        <div class="filter-control">
          <label class="filter-label" for="filterTable">Table:</label>
          <select class="filter-input" id="filterTable" title="Filter by table">
            <option value="">All tables</option>
            <option value="table_1">Table 1</option>
            <option value="table_2">Table 2</option>
            <option value="table_3">Table 3</option>
          </select>
        </div>
        <div class="filter-control">
          <label class="filter-label" for="filterEvent">Event:</label>
          <select class="filter-input" id="filterEvent" title="Filter by event type">
            <option value="">All events</option>
            <option value="requested">Requested</option>
            <option value="served">Served</option>
          </select>
        </div>
      </div>

      <div class="history-table">
        <div class="table-header">
          <div class="table-header-cell">Date</div>
          <div class="table-header-cell">Time</div>
          <div class="table-header-cell">Table</div>
          <div class="table-header-cell">Event Type</div>
          <div class="table-header-cell">Status</div>
        </div>
        <div class="table-body" id="historyTable">
          <div class="empty-history">Loading historical data from Firebase...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDGEmefDNithsiaIjsTMSJC4C7E7u_ad_0",
      authDomain: "smartwaiter-c9a2e.firebaseapp.com",
      databaseURL: "https://smartwaiter-c9a2e-default-rtdb.firebaseio.com",
      projectId: "smartwaiter-c9a2e",
      storageBucket: "smartwaiter-c9a2e.firebasestorage.app",
      messagingSenderId: "405623064041",
      appId: "1:405623064041:web:c69fe02b0fe1fc1efb3778"
    };

    const connectionDot = document.getElementById("connectionDot");
    const connectionText = document.getElementById("connectionText");
    const lastSync = document.getElementById("lastSync");
    const historyTable = document.getElementById("historyTable");
    const filterDate = document.getElementById("filterDate");
    const filterTable = document.getElementById("filterTable");
    const filterEvent = document.getElementById("filterEvent");
    const refreshButton = document.getElementById("refreshButton");
    const exportButton = document.getElementById("exportButton");

    let allEvents = [];

    function updateLastSync() {
      lastSync.textContent = "Last sync: " + new Date().toLocaleTimeString(undefined, {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function setConnection(state, message) {
      const normalized = state || "reconnecting";
      connectionDot.className = "dot " + normalized;
      connectionText.textContent = message;
      if (normalized === "connected") updateLastSync();
    }

    function parseTimestamp(value) {
      if (!value) return null;
      if (typeof value === "number") {
        const milliseconds = value < 1000000000000 ? value * 1000 : value;
        const date = new Date(milliseconds);
        return Number.isNaN(date.getTime()) ? null : date;
      }
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDate(value) {
      const date = parseTimestamp(value);
      if (!date) return "-";
      return date.toLocaleDateString(undefined, { year: "numeric", month: "2-digit", day: "2-digit" });
    }

    function formatTime(value) {
      const date = parseTimestamp(value);
      if (!date) return "-";
      return date.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function renderTable() {
      historyTable.replaceChildren();

      const dateFilter = filterDate.value;
      const tableFilter = filterTable.value;
      const eventFilter = filterEvent.value;

      let filtered = allEvents;

      if (dateFilter) {
        const filterDateObj = new Date(dateFilter);
        const filterDateString = filterDateObj.toDateString();
        filtered = filtered.filter((event) => {
          const eventDate = parseTimestamp(event.timestamp);
          return eventDate && eventDate.toDateString() === filterDateString;
        });
      }

      if (tableFilter) {
        filtered = filtered.filter((event) => event.table_id === tableFilter);
      }

      if (eventFilter) {
        filtered = filtered.filter((event) => event.event_type === eventFilter);
      }

      if (!filtered.length) {
        const emptyRow = document.createElement("div");
        emptyRow.className = "empty-history";
        emptyRow.textContent = "No events found matching your filters.";
        historyTable.append(emptyRow);
        return;
      }

      filtered.forEach((event) => {
        const row = document.createElement("div");
        row.className = "table-row";

        const dateCell = document.createElement("div");
        dateCell.className = "table-cell";
        dateCell.textContent = formatDate(event.timestamp);

        const timeCell = document.createElement("div");
        timeCell.className = "table-cell";
        timeCell.textContent = formatTime(event.timestamp);

        const tableCell = document.createElement("div");
        tableCell.className = "table-cell table-id";
        tableCell.textContent = String(event.table_id || "Unknown").replace(/_/g, " ").toUpperCase();

        const eventCell = document.createElement("div");
        eventCell.className = "table-cell";
        eventCell.textContent = String(event.event_type || "Unknown").replace(/_/g, " ").toUpperCase();

        const statusCell = document.createElement("div");
        statusCell.className =
          "table-cell status-" +
          (event.event_type === "requested" ? "requested" : event.event_type === "served" ? "served" : "idle");
        statusCell.textContent = event.event_type === "requested" ? "● Waiting" : event.event_type === "served" ? "● Complete" : "● Idle";

        row.append(dateCell, timeCell, tableCell, eventCell, statusCell);
        historyTable.append(row);
      });
    }

    function loadHistoryFromFirebase(db) {
      const requestsRef = db.ref("requests");

      requestsRef.on(
        "value",
        (snapshot) => {
          setConnection("connected", "Firebase connected");
          const data = snapshot.val();

          if (!data || typeof data !== "object") {
            allEvents = [];
            renderTable();
            return;
          }

          allEvents = Object.entries(data)
            .map(([key, value]) => ({
              id: key,
              table_id: value.table_id || value.tableId || "Unknown",
              event_type: value.event_type || value.eventType || "Unknown",
              timestamp: value.timestamp || value.time || value.iso_time
            }))
            .sort((a, b) => {
              const aTime = parseTimestamp(a.timestamp)?.getTime() || 0;
              const bTime = parseTimestamp(b.timestamp)?.getTime() || 0;
              return bTime - aTime;
            });

          renderTable();
        },
        (error) => {
          setConnection("error", "Connection error");
          historyTable.replaceChildren();
          const emptyRow = document.createElement("div");
          emptyRow.className = "empty-history";
          emptyRow.textContent = "Could not load history: " + error.message;
          historyTable.append(emptyRow);
        }
      );
    }

    filterDate.addEventListener("change", renderTable);
    filterTable.addEventListener("change", renderTable);
    filterEvent.addEventListener("change", renderTable);

    refreshButton.addEventListener("click", () => {
      window.location.reload();
    });

    exportButton.addEventListener("click", () => {
      if (!allEvents.length) {
        alert("No data to export");
        return;
      }

      const csv = [
        ["Date", "Time", "Table", "Event Type", "Status"]
          .join(",")
      ]
        .concat(
          allEvents.map(
            (event) =>
              [
                formatDate(event.timestamp),
                formatTime(event.timestamp),
                String(event.table_id).toUpperCase(),
                String(event.event_type).toUpperCase(),
                event.event_type === "requested" ? "Waiting" : event.event_type === "served" ? "Complete" : "Idle"
              ].join(",")
          )
        )
        .join("\n");

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "service_history_" + new Date().toISOString().split("T")[0] + ".csv";
      a.click();
      URL.revokeObjectURL(url);
    });

    setConnection("connected", "Firebase connected");
    updateLastSync();

    try {
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      loadHistoryFromFirebase(db);
    } catch (err) {
      setConnection("error", "Init failed");
      const emptyRow = document.createElement("div");
      emptyRow.className = "empty-history";
      emptyRow.textContent = "Firebase initialization error: " + err.message;
      historyTable.append(emptyRow);
    }
  </script>
</body>
</html>
