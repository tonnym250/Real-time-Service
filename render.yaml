services:
  - type: web
    name: realtime-service-delivery-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py
    envVars:
      - key: PORT
        value: 10000
      - key: FIREBASE_DATABASE_URL
        value: https://smartwaiter-c9a2e-default-rtdb.firebaseio.com
